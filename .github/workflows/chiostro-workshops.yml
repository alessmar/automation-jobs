name: Chiostro workshops email

on:
  schedule:
    # GitHub Actions cron is UTC. This is 07:30 Europe/Rome during daylight saving time.
    - cron: "30 5 * * 1,4,6"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send workshop email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.GMAIL_ADDRESS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/chiostro_workshops_email.py
